version: "3.8"

services:
  freeipa:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: freeipa-server
    hostname: ipa.example.com
    domainname: example.com
    privileged: true
    tmpfs:
      - /run
      - /tmp
    volumes:
      - freeipa-data:/data
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "80:80"
      - "443:443"
      - "389:389"
      - "636:636"
      - "88:88/tcp"
      - "88:88/udp"
      - "464:464/tcp"
      - "464:464/udp"
    environment:
      - IPA_SERVER_IP=0.0.0.0
    stdin_open: true
    tty: true

volumes:
  freeipa-data:
